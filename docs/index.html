<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comit&eacute; ODGG</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/index-page.css">
</head>
<body>

  <h1>Comit&eacute; ODGG</h1>

  <div id="navbar"></div>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/odgg-tools.js"></script>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Connexion Admin</h3>
      <input type="password" id="passInput" placeholder="Mot de passe..." autocomplete="off"/>
      <button class="btn-confirm" id="btnPassOk">Se connecter</button>
      <div class="modal-error" id="modalError"></div>
    </div>
  </div>

  <div class="container">
    <div class="section-title" id="addTitle" style="display:none">Ajouter un membre</div>
    <div class="add-form" id="addForm" style="display:none">
      <input id="nameInput" type="text" placeholder="Nom du membre..." maxlength="30"/>
      <input id="roleInput" type="text" placeholder="Poste..." maxlength="40"/>
      <button class="btn-add" id="btnAdd">+</button>
    </div>

    <div class="section-title">Membres</div>
    <div class="member-list" id="memberList">
      <div class="empty-msg" id="emptyMsg">Aucun membre pour l'instant</div>
    </div>
    <div class="member-count" id="memberCount"></div>
  </div>

  <script src="assets/js/index-page.js"></script>
</body>
</html>
