<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dettes ODGG</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/dette-page.css">
</head>
<body>

  <h1>Dettes ODGG</h1>

  <div id="navbar"></div>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/odgg-tools.js"></script>

  <!-- MODAL LOGIN -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Connexion Admin</h3>
      <input type="password" id="passInput" placeholder="Mot de passe..." autocomplete="off"/>
      <button class="btn-confirm" id="btnPassOk">Se connecter</button>
      <div class="modal-error" id="modalError"></div>
    </div>
  </div>

  <div class="container">
    <!-- ADD DEBT FORM (admin only) -->
    <div class="add-form admin-only" id="addForm">
      <div class="form-row">
        <div>
          <label>Débiteur</label>
          <select id="selectFrom"><option value="">-- Membre --</option></select>
        </div>
        <span class="arrow">→</span>
        <div>
          <label>Créancier</label>
          <select id="selectTo"><option value="">-- Membre --</option></select>
        </div>
      </div>
      <label>Montant (€)</label>
      <input type="number" id="amountInput" placeholder="0.00" min="0.01" step="0.01"/>
      <button class="btn-add-debt" id="btnAddDebt">Ajouter la dette</button>
    </div>

    <div class="section-title">Liste des dettes</div>
    <div class="debt-list" id="debtList">
      <div class="empty-msg" id="emptyMsg">Aucune dette enregistrée</div>
    </div>
    <div class="hint" id="hint"></div>

    <!-- SUMMARY PER MEMBER -->
    <div class="summary" id="summarySection" style="display:none">
      <div class="section-title">Résumé par membre</div>
      <div id="summaryList"></div>
    </div>
  </div>

  <script src="assets/js/dette-page.js"></script>
</body>
</html>
