<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats ODGG</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="assets/css/stats-page.css">
</head>
<body>

  <h1>Stats ODGG</h1>

  <div id="navbar"></div>
  <script src="assets/js/nav.js"></script>
  <script src="assets/js/odgg-tools.js"></script>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Connexion Admin</h3>
      <input type="password" id="passInput" placeholder="Mot de passe..." autocomplete="off"/>
      <button class="btn-confirm" id="btnPassOk">Se connecter</button>
      <div class="modal-error" id="modalError"></div>
    </div>
  </div>

  <div class="container">
    <div class="stats-grid" id="statsGrid"></div>

    <div class="panel">
      <div class="section-title">Top Cruche</div>
      <div id="topCruche" class="list"></div>
    </div>

    <div class="panel">
      <div class="section-title">Historique récent</div>
      <div id="historyList" class="list"></div>
    </div>

    <div class="panel">
      <div class="section-title">Partage lecture seule</div>
      <div class="share-row">
        <input id="readonlyLink" type="text" readonly>
        <button id="btnCopyReadonly" class="btn-add">Copier</button>
      </div>
    </div>

    <div class="panel admin-only" id="backupPanel">
      <div class="section-title">Sauvegarde</div>
      <div class="actions">
        <button id="btnExport" class="btn-add">Exporter JSON</button>
        <input id="importFile" type="file" accept="application/json">
        <button id="btnImport" class="btn-add">Importer JSON</button>
      </div>
      <div class="hint" id="backupHint"></div>
    </div>
  </div>

  <script src="assets/js/stats-page.js"></script>
</body>
</html>
