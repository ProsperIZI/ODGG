<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comit&eacute; ODGG</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 32px;
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666;
    }

    /* NAV */
    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    nav a, nav button {
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
      border: 1px solid #2a2a40;
      color: #888;
      background: #1a1a2e;
      cursor: pointer;
    }
    nav a:hover, nav button:hover { opacity: 0.75; }
    nav a.active { background: #6c63ff; color: #fff; border-color: #6c63ff; }
    nav .btn-login { border-color: #ffbe76; color: #ffbe76; }
    nav .btn-logout { border-color: #6c63ff; color: #6c63ff; }

    /* ADMIN */
    .admin-only { display: none !important; }
    body.is-admin .admin-only { display: flex !important; }
    body.is-admin .admin-only-inline { display: inline-block !important; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 16px;
      padding: 32px;
      width: 320px;
      text-align: center;
    }
    .modal h3 {
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 20px;
    }
    .modal input {
      width: 100%;
      background: #12121f;
      border: 1px solid #2a2a40;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 12px;
      text-align: center;
    }
    .modal input:focus { border-color: #6c63ff; }
    .modal .btn-confirm {
      width: 100%;
      padding: 12px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .modal .btn-confirm:hover { opacity: 0.85; }
    .modal .modal-error {
      color: #ff6584;
      font-size: 0.8rem;
      margin-top: 10px;
      min-height: 1.2em;
    }

    /* CONTENT */
    .container {
      width: 100%;
      max-width: 500px;
    }

    .section-title {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 16px;
    }

    /* ADD FORM */
    .add-form {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-form input {
      flex: 1;
      min-width: 120px;
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-form input:focus { border-color: #6c63ff; }
    .add-form input::placeholder { color: #444; }

    .btn-add {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }

    /* MEMBER LIST */
    .member-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .member-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 12px;
      padding: 12px 16px;
    }

    .member-info { display: flex; flex-direction: column; }
    .member-name { font-size: 0.95rem; font-weight: 600; }
    .member-role {
      font-size: 0.75rem;
      color: #9d97ff;
      margin-top: 2px;
      background: #6c63ff22;
      padding: 2px 8px;
      border-radius: 12px;
      display: inline-block;
    }
    .member-role.empty { color: #444; background: none; }

    .member-score { font-size: 0.7rem; color: #555; margin-top: 4px; }

    .btn-edit-role {
      background: #1a1a2e;
      color: #888;
      border: 1px solid #2a2a40;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .btn-edit-role:hover { border-color: #6c63ff; color: #fff; }

    .role-edit-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      align-items: center;
    }
    .role-edit-input {
      background: #12121f;
      border: 1px solid #6c63ff;
      border-radius: 8px;
      padding: 5px 10px;
      color: #fff;
      font-size: 0.8rem;
      outline: none;
      width: 140px;
    }
    .btn-save-role {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-save-role:hover { opacity: 0.85; }

    .btn-remove {
      background: #2a2a40;
      color: #888;
      border: none;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
    }
    .btn-remove:hover { background: #ff6584; color: #fff; }

    .empty-msg {
      color: #333;
      font-size: 0.85rem;
      text-align: center;
      padding: 32px 0;
      font-style: italic;
    }

    .member-count {
      font-size: 0.75rem;
      color: #444;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <h1>Comit&eacute; ODGG</h1>

  <nav>
    <a href="index.html">Empereur</a>
    <a href="comite.html" class="active">Comit&eacute;</a>
    <a href="cruche.html">Cruche</a>
    <button class="btn-login" id="btnLogin">Admin</button>
  </nav>

  <!-- MODAL LOGIN -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Connexion Admin</h3>
      <input type="password" id="passInput" placeholder="Mot de passe..." autocomplete="off"/>
      <button class="btn-confirm" id="btnPassOk">Se connecter</button>
      <div class="modal-error" id="modalError"></div>
    </div>
  </div>

  <div class="container">
    <div class="section-title admin-only">Ajouter un membre</div>
    <div class="add-form admin-only">
      <input id="nameInput" type="text" placeholder="Nom du membre..." maxlength="30"/>
      <input id="roleInput" type="text" placeholder="Poste..." maxlength="40"/>
      <button class="btn-add" id="btnAdd">+</button>
    </div>

    <div class="section-title">Membres</div>
    <div class="member-list" id="memberList">
      <div class="empty-msg" id="emptyMsg">Aucun membre pour l'instant</div>
    </div>
    <div class="member-count" id="memberCount"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyBECOMyRRCKaAOThoUAS4STiFFPNhlbpvs",
      authDomain:        "odgg-80281.firebaseapp.com",
      databaseURL:       "https://odgg-80281-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "odgg-80281",
      storageBucket:     "odgg-80281.firebasestorage.app",
      messagingSenderId: "542453001838",
      appId:             "1:542453001838:web:77ae05671f3d2a299b407f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const membersRef = db.ref('comite/members');

    // ── ADMIN AUTH ──
    let isAdmin = false;
    const btnLogin     = document.getElementById('btnLogin');
    const modalOverlay = document.getElementById('modalOverlay');
    const passInput    = document.getElementById('passInput');
    const btnPassOk    = document.getElementById('btnPassOk');
    const modalError   = document.getElementById('modalError');

    function setAdmin(val) {
      isAdmin = val;
      if (val) {
        document.body.classList.add('is-admin');
        btnLogin.textContent = 'Deconnexion';
        btnLogin.className = 'btn-logout';
        localStorage.setItem('odgg_admin', '1');
      } else {
        document.body.classList.remove('is-admin');
        btnLogin.textContent = 'Admin';
        btnLogin.className = 'btn-login';
        localStorage.removeItem('odgg_admin');
      }
      renderMembers();
    }

    btnLogin.addEventListener('click', () => {
      if (isAdmin) { setAdmin(false); return; }
      modalOverlay.classList.add('open');
      passInput.value = '';
      modalError.textContent = '';
      passInput.focus();
    });

    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) modalOverlay.classList.remove('open');
    });

    function tryLogin() {
      const pass = passInput.value;
      db.ref('config/adminPass').once('value', snap => {
        const stored = snap.val();
        if (!stored) {
          db.ref('config/adminPass').set('odgg');
          if (pass === 'odgg') { setAdmin(true); modalOverlay.classList.remove('open'); }
          else { modalError.textContent = 'Mot de passe incorrect'; }
        } else if (pass === stored) {
          setAdmin(true); modalOverlay.classList.remove('open');
        } else {
          modalError.textContent = 'Mot de passe incorrect';
        }
      });
    }

    btnPassOk.addEventListener('click', tryLogin);
    passInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    if (localStorage.getItem('odgg_admin') === '1') {
      db.ref('config/adminPass').once('value', () => setAdmin(true));
    }

    // ── DOM ──
    const nameInput    = document.getElementById('nameInput');
    const roleInput    = document.getElementById('roleInput');
    const btnAdd       = document.getElementById('btnAdd');
    const memberList   = document.getElementById('memberList');
    const emptyMsg     = document.getElementById('emptyMsg');
    const memberCount  = document.getElementById('memberCount');

    let membersData = {};

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addMember() {
      const name = nameInput.value.trim();
      if (!name) return;
      const role = roleInput.value.trim();
      membersRef.push({ name, role: role || '', score: 0, createdAt: Date.now() });
      nameInput.value = '';
      roleInput.value = '';
      nameInput.focus();
    }

    function toggleRoleEdit(id, currentRole) {
      const existing = document.getElementById('role-edit-' + id);
      if (existing) { existing.remove(); return; }
      document.querySelectorAll('.role-edit-row').forEach(el => el.remove());

      const card = document.querySelector(`[data-card="${id}"]`);
      if (!card) return;
      const info = card.querySelector('.member-info');

      const row = document.createElement('div');
      row.className = 'role-edit-row';
      row.id = 'role-edit-' + id;
      row.innerHTML = `
        <input class="role-edit-input" type="text" value="${escHtml(currentRole)}" placeholder="Poste..." maxlength="40"/>
        <button class="btn-save-role">OK</button>`;
      info.appendChild(row);

      const input = row.querySelector('input');
      const btnSave = row.querySelector('.btn-save-role');
      input.focus();

      function save() {
        membersRef.child(id).update({ role: input.value.trim() });
        row.remove();
      }
      btnSave.addEventListener('click', save);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
    }

    btnAdd.addEventListener('click', addMember);
    nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') roleInput.focus(); });
    roleInput.addEventListener('keydown', e => { if (e.key === 'Enter') addMember(); });

    function renderMembers() {
      const data = membersData;
      const entries = Object.entries(data).sort(([,a],[,b]) => a.createdAt - b.createdAt);
      memberList.innerHTML = '';

      if (entries.length === 0) {
        memberList.appendChild(emptyMsg);
        memberCount.textContent = '';
        return;
      }

      entries.forEach(([id, m]) => {
        const role = m.role || '';
        const card = document.createElement('div');
        card.className = 'member-card';
        card.setAttribute('data-card', id);

        const adminBtns = isAdmin
          ? `<div style="display:flex;gap:6px;align-items:center">
               <button class="btn-edit-role" data-edit="${id}" data-role="${escHtml(role)}">Poste</button>
               <button class="btn-remove" data-id="${id}">&#x2715;</button>
             </div>`
          : '';

        card.innerHTML = `
          <div class="member-info">
            <div class="member-name">${escHtml(m.name)}</div>
            <div class="member-role ${role ? '' : 'empty'}">${role ? escHtml(role) : 'Aucun poste'}</div>
            <div class="member-score">Score cruche : ${m.score || 0}</div>
          </div>${adminBtns}`;
        memberList.appendChild(card);
      });

      if (isAdmin) {
        memberList.querySelectorAll('.btn-remove').forEach(btn => {
          btn.addEventListener('click', () => membersRef.child(btn.dataset.id).remove());
        });
        memberList.querySelectorAll('.btn-edit-role').forEach(btn => {
          btn.addEventListener('click', () => toggleRoleEdit(btn.dataset.edit, btn.dataset.role));
        });
      }

      memberCount.textContent = `${entries.length} membre${entries.length > 1 ? 's' : ''}`;
    }

    membersRef.on('value', snap => {
      membersData = snap.val() || {};
      renderMembers();
    });
  </script>
</body>
</html>
