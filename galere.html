<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galère ODGG</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 32px;
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666;
    }

    /* NAV */
    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    nav a, nav button {
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
      border: 1px solid #2a2a40;
      color: #888;
      background: #1a1a2e;
      cursor: pointer;
    }
    nav a:hover, nav button:hover { opacity: 0.75; }
    nav a.active { background: #6c63ff; color: #fff; border-color: #6c63ff; }
    nav .btn-login { border-color: #ffbe76; color: #ffbe76; }
    nav .btn-logout { border-color: #6c63ff; color: #6c63ff; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 16px;
      padding: 32px;
      width: 320px;
      text-align: center;
    }
    .modal h3 {
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 20px;
    }
    .modal input {
      width: 100%;
      background: #12121f;
      border: 1px solid #2a2a40;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 12px;
      text-align: center;
    }
    .modal input:focus { border-color: #6c63ff; }
    .modal .btn-confirm {
      width: 100%;
      padding: 12px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .modal .btn-confirm:hover { opacity: 0.85; }
    .modal .modal-error {
      color: #ff6584;
      font-size: 0.8rem;
      margin-top: 10px;
      min-height: 1.2em;
    }

    /* CONTENT */
    .container {
      width: 100%;
      max-width: 600px;
    }

    .section-title {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 16px;
      text-align: center;
    }

    .member-block {
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 12px;
    }

    .member-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .member-name {
      font-size: 1rem;
      font-weight: 700;
    }

    .member-role {
      font-size: 0.7rem;
      color: #9d97ff;
      background: #6c63ff22;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .anecdotes {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .anecdote {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 12px;
      background: #12121f;
      border: 1px solid #2a2a40;
      border-radius: 10px;
      font-size: 0.88rem;
      color: #ccc;
      line-height: 1.4;
    }

    .anecdote-bullet {
      color: #6c63ff;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .anecdote-text {
      flex: 1;
      word-break: break-word;
    }

    .btn-remove-anecdote {
      background: none;
      border: none;
      color: #333;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 0 4px;
      flex-shrink: 0;
      transition: color 0.2s;
    }
    .btn-remove-anecdote:hover { color: #ff6584; }

    .no-anecdotes {
      font-size: 0.8rem;
      color: #333;
      font-style: italic;
      padding: 4px 0;
    }

    .add-anecdote {
      display: flex;
      gap: 8px;
    }

    .add-anecdote input {
      flex: 1;
      background: #12121f;
      border: 1px solid #2a2a40;
      border-radius: 10px;
      padding: 8px 12px;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-anecdote input:focus { border-color: #6c63ff; }
    .add-anecdote input::placeholder { color: #444; }

    .btn-add-anecdote {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-add-anecdote:hover { opacity: 0.85; }

    .empty-msg {
      color: #333;
      font-size: 0.85rem;
      text-align: center;
      padding: 32px 0;
      font-style: italic;
    }

    .member-count {
      font-size: 0.75rem;
      color: #444;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <h1>Galère ODGG</h1>

  <nav>
    <a href="empereur.html">Empereur</a>
    <a href="index.html">Comité</a>
    <a href="cruche.html">Cruche</a>
    <a href="galere.html" class="active">Galère</a>
    <a href="congele.html">Congèle</a>
    <a href="dette.html">Dettes</a>
    <button class="btn-login" id="btnLogin">Admin</button>
  </nav>

  <!-- MODAL LOGIN -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Connexion Admin</h3>
      <input type="password" id="passInput" placeholder="Mot de passe..." autocomplete="off"/>
      <button class="btn-confirm" id="btnPassOk">Se connecter</button>
      <div class="modal-error" id="modalError"></div>
    </div>
  </div>

  <div class="container">
    <div class="section-title">Galères</div>
    <div id="memberList">
      <div class="empty-msg" id="emptyMsg">Aucun membre dans le comité</div>
    </div>
    <div class="member-count" id="memberCount"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyBECOMyRRCKaAOThoUAS4STiFFPNhlbpvs",
      authDomain:        "odgg-80281.firebaseapp.com",
      databaseURL:       "https://odgg-80281-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "odgg-80281",
      storageBucket:     "odgg-80281.firebasestorage.app",
      messagingSenderId: "542453001838",
      appId:             "1:542453001838:web:77ae05671f3d2a299b407f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const membersRef = db.ref('comite/members');
    const anecdotesRef = db.ref('galere/anecdotes');

    // ── ADMIN AUTH ──
    let isAdmin = false;
    const btnLogin     = document.getElementById('btnLogin');
    const modalOverlay = document.getElementById('modalOverlay');
    const passInput    = document.getElementById('passInput');
    const btnPassOk    = document.getElementById('btnPassOk');
    const modalError   = document.getElementById('modalError');

    function setAdmin(val) {
      isAdmin = val;
      if (val) {
        document.body.classList.add('is-admin');
        btnLogin.textContent = 'Deconnexion';
        btnLogin.className = 'btn-logout';
        localStorage.setItem('odgg_admin', '1');
      } else {
        document.body.classList.remove('is-admin');
        btnLogin.textContent = 'Admin';
        btnLogin.className = 'btn-login';
        localStorage.removeItem('odgg_admin');
      }
      render();
    }

    btnLogin.addEventListener('click', () => {
      if (isAdmin) { setAdmin(false); return; }
      modalOverlay.classList.add('open');
      passInput.value = '';
      modalError.textContent = '';
      passInput.focus();
    });

    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) modalOverlay.classList.remove('open');
    });

    function tryLogin() {
      const pass = passInput.value;
      db.ref('config/adminPass').once('value', snap => {
        const stored = snap.val();
        if (!stored) {
          db.ref('config/adminPass').set('odgg');
          if (pass === 'odgg') { setAdmin(true); modalOverlay.classList.remove('open'); }
          else { modalError.textContent = 'Mot de passe incorrect'; }
        } else if (pass === stored) {
          setAdmin(true); modalOverlay.classList.remove('open');
        } else {
          modalError.textContent = 'Mot de passe incorrect';
        }
      });
    }

    btnPassOk.addEventListener('click', tryLogin);
    passInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    if (localStorage.getItem('odgg_admin') === '1') {
      db.ref('config/adminPass').once('value', () => setAdmin(true));
    }

    // ── DATA ──
    const memberListEl = document.getElementById('memberList');
    const emptyMsg     = document.getElementById('emptyMsg');
    const memberCount  = document.getElementById('memberCount');

    let membersData = {};
    let anecdotesData = {};

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addAnecdote(memberId) {
      const input = document.getElementById('anecdote-input-' + memberId);
      if (!input) return;
      const text = input.value.trim();
      if (!text) return;
      anecdotesRef.child(memberId).push({ text: text, createdAt: Date.now() });
      input.value = '';
      input.focus();
    }

    function removeAnecdote(memberId, anecdoteId) {
      anecdotesRef.child(memberId).child(anecdoteId).remove();
    }

    function render() {
      const entries = Object.entries(membersData).sort((a, b) => a[1].createdAt - b[1].createdAt);
      memberListEl.innerHTML = '';

      if (entries.length === 0) {
        memberListEl.appendChild(emptyMsg);
        memberCount.textContent = '';
        return;
      }

      entries.forEach(([id, m]) => {
        const memberAnecdotes = anecdotesData[id] || {};
        const anecdoteEntries = Object.entries(memberAnecdotes).sort((a, b) => a[1].createdAt - b[1].createdAt);

        const block = document.createElement('div');
        block.className = 'member-block';

        let anecdotesHtml = '';
        if (anecdoteEntries.length > 0) {
          anecdotesHtml = '<div class="anecdotes">' + anecdoteEntries.map(([aId, a]) => {
            const removeBtn = isAdmin
              ? '<button class="btn-remove-anecdote" data-member="' + id + '" data-anecdote="' + aId + '">&times;</button>'
              : '';
            return '<div class="anecdote">' +
              '<span class="anecdote-bullet">&rsaquo;</span>' +
              '<span class="anecdote-text">' + escHtml(a.text) + '</span>' +
              removeBtn +
              '</div>';
          }).join('') + '</div>';
        } else {
          anecdotesHtml = '<div class="no-anecdotes">Aucune galère</div>';
        }

        const addHtml = isAdmin
          ? '<div class="add-anecdote">' +
              '<input id="anecdote-input-' + id + '" type="text" placeholder="Ajouter une galère..." maxlength="200"/>' +
              '<button class="btn-add-anecdote" data-member="' + id + '">+</button>' +
            '</div>'
          : '';

        const roleHtml = m.role
          ? '<span class="member-role">' + escHtml(m.role) + '</span>'
          : '';

        block.innerHTML =
          '<div class="member-header">' +
            '<span class="member-name">' + escHtml(m.name) + '</span>' +
            roleHtml +
          '</div>' +
          anecdotesHtml +
          addHtml;

        memberListEl.appendChild(block);
      });

      // Event listeners
      if (isAdmin) {
        memberListEl.querySelectorAll('.btn-add-anecdote').forEach(btn => {
          const memberId = btn.dataset.member;
          btn.addEventListener('click', () => addAnecdote(memberId));
        });

        memberListEl.querySelectorAll('.add-anecdote input').forEach(input => {
          const memberId = input.id.replace('anecdote-input-', '');
          input.addEventListener('keydown', e => { if (e.key === 'Enter') addAnecdote(memberId); });
        });

        memberListEl.querySelectorAll('.btn-remove-anecdote').forEach(btn => {
          btn.addEventListener('click', () => removeAnecdote(btn.dataset.member, btn.dataset.anecdote));
        });
      }

      memberCount.textContent = entries.length + ' membre' + (entries.length > 1 ? 's' : '');
    }

    membersRef.on('value', snap => {
      membersData = snap.val() || {};
      render();
    });

    anecdotesRef.on('value', snap => {
      anecdotesData = snap.val() || {};
      render();
    });
  </script>
</body>
</html>
