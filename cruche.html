<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cruche ODGG</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 32px;
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666;
    }

    /* NAV */
    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    nav a, nav button {
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
      border: 1px solid #2a2a40;
      color: #888;
      background: #1a1a2e;
      cursor: pointer;
    }
    nav a:hover, nav button:hover { opacity: 0.75; }
    nav a.active { background: #6c63ff; color: #fff; border-color: #6c63ff; }
    nav .btn-login { border-color: #ffbe76; color: #ffbe76; }
    nav .btn-logout { border-color: #6c63ff; color: #6c63ff; }

    /* ADMIN */
    .admin-only { display: none !important; }
    body.is-admin .admin-only { display: flex !important; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 16px;
      padding: 32px;
      width: 320px;
      text-align: center;
    }
    .modal h3 {
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 20px;
    }
    .modal input {
      width: 100%;
      background: #12121f;
      border: 1px solid #2a2a40;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 12px;
      text-align: center;
    }
    .modal input:focus { border-color: #6c63ff; }
    .modal .btn-confirm {
      width: 100%;
      padding: 12px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .modal .btn-confirm:hover { opacity: 0.85; }
    .modal .modal-error {
      color: #ff6584;
      font-size: 0.8rem;
      margin-top: 10px;
      min-height: 1.2em;
    }

    /* TABLE */
    .container {
      width: 100%;
      max-width: 550px;
    }

    .section-title {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 16px;
      text-align: center;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
    }

    thead th {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      padding: 8px 14px;
      text-align: left;
      font-weight: 600;
    }
    thead th:last-child { text-align: center; }
    thead th.col-score { text-align: center; }

    tbody tr {
      background: #1a1a2e;
    }

    tbody td {
      padding: 10px 14px;
      font-size: 0.95rem;
      border-top: 1px solid #2a2a40;
      border-bottom: 1px solid #2a2a40;
    }

    tbody td:first-child {
      border-left: 1px solid #2a2a40;
      border-radius: 10px 0 0 10px;
    }
    tbody td:last-child {
      border-right: 1px solid #2a2a40;
      border-radius: 0 10px 10px 0;
    }

    .col-rank {
      width: 40px;
      text-align: center;
      font-weight: 700;
      color: #444;
    }
    tbody tr:nth-child(1) .col-rank { color: #ffd700; font-size: 1.1rem; }
    tbody tr:nth-child(2) .col-rank { color: #c0c0c0; font-size: 1.05rem; }
    tbody tr:nth-child(3) .col-rank { color: #cd7f32; font-size: 1rem; }

    .col-name { font-weight: 600; }

    .col-score {
      text-align: center;
      font-weight: 700;
      font-size: 1.1rem;
      min-width: 50px;
    }
    .score-positive { color: #ff6584; }
    .score-zero { color: #555; }

    .col-actions {
      text-align: center;
      white-space: nowrap;
    }

    .btn-score {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      margin: 0 3px;
    }
    .btn-score:active { transform: scale(0.9); }

    .btn-plus {
      background: #ff6584;
      color: #fff;
    }
    .btn-plus:hover { opacity: 0.85; }

    .btn-minus {
      background: #1a1a2e;
      color: #888;
      border: 1px solid #2a2a40;
    }
    .btn-minus:hover { opacity: 0.75; }

    .empty-msg {
      color: #333;
      font-size: 0.85rem;
      text-align: center;
      padding: 32px 0;
      font-style: italic;
    }

    .hint {
      font-size: 0.75rem;
      color: #444;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <h1>Cruche ODGG</h1>

  <nav>
    <a href="index.html">Empereur</a>
    <a href="comite.html">Comit&eacute;</a>
    <a href="cruche.html" class="active">Cruche</a>
    <button class="btn-login" id="btnLogin">Admin</button>
  </nav>

  <!-- MODAL LOGIN -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Connexion Admin</h3>
      <input type="password" id="passInput" placeholder="Mot de passe..." autocomplete="off"/>
      <button class="btn-confirm" id="btnPassOk">Se connecter</button>
      <div class="modal-error" id="modalError"></div>
    </div>
  </div>

  <div class="container">
    <div class="section-title">Tableau des cruches</div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Membre</th>
          <th class="col-score">Score</th>
          <th id="thActions"></th>
        </tr>
      </thead>
      <tbody id="tableBody">
      </tbody>
    </table>

    <div class="empty-msg" id="emptyMsg">Aucun membre &mdash; ajoute des membres dans le Comit&eacute;</div>
    <div class="hint" id="hint"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyBECOMyRRCKaAOThoUAS4STiFFPNhlbpvs",
      authDomain:        "odgg-80281.firebaseapp.com",
      databaseURL:       "https://odgg-80281-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "odgg-80281",
      storageBucket:     "odgg-80281.firebasestorage.app",
      messagingSenderId: "542453001838",
      appId:             "1:542453001838:web:77ae05671f3d2a299b407f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const membersRef = db.ref('comite/members');

    // ── ADMIN AUTH ──
    let isAdmin = false;
    const btnLogin     = document.getElementById('btnLogin');
    const modalOverlay = document.getElementById('modalOverlay');
    const passInput    = document.getElementById('passInput');
    const btnPassOk    = document.getElementById('btnPassOk');
    const modalError   = document.getElementById('modalError');

    function setAdmin(val) {
      isAdmin = val;
      if (val) {
        document.body.classList.add('is-admin');
        btnLogin.textContent = 'Deconnexion';
        btnLogin.className = 'btn-logout';
        localStorage.setItem('odgg_admin', '1');
      } else {
        document.body.classList.remove('is-admin');
        btnLogin.textContent = 'Admin';
        btnLogin.className = 'btn-login';
        localStorage.removeItem('odgg_admin');
      }
      renderTable();
    }

    btnLogin.addEventListener('click', () => {
      if (isAdmin) { setAdmin(false); return; }
      modalOverlay.classList.add('open');
      passInput.value = '';
      modalError.textContent = '';
      passInput.focus();
    });

    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) modalOverlay.classList.remove('open');
    });

    function tryLogin() {
      const pass = passInput.value;
      db.ref('config/adminPass').once('value', snap => {
        const stored = snap.val();
        if (!stored) {
          db.ref('config/adminPass').set('odgg');
          if (pass === 'odgg') { setAdmin(true); modalOverlay.classList.remove('open'); }
          else { modalError.textContent = 'Mot de passe incorrect'; }
        } else if (pass === stored) {
          setAdmin(true); modalOverlay.classList.remove('open');
        } else {
          modalError.textContent = 'Mot de passe incorrect';
        }
      });
    }

    btnPassOk.addEventListener('click', tryLogin);
    passInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    if (localStorage.getItem('odgg_admin') === '1') {
      db.ref('config/adminPass').once('value', () => setAdmin(true));
    }

    // ── TABLE ──
    const tableBody = document.getElementById('tableBody');
    const emptyMsg  = document.getElementById('emptyMsg');
    const hint      = document.getElementById('hint');

    let membersData = {};

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function changeScore(id, delta) {
      membersRef.child(id).child('score').transaction(current => {
        const val = (current || 0) + delta;
        return val < 0 ? 0 : val;
      });
    }

    function renderTable() {
      const entries = Object.entries(membersData).sort(([,a],[,b]) => (b.score || 0) - (a.score || 0));
      tableBody.innerHTML = '';

      if (entries.length === 0) {
        emptyMsg.style.display = 'block';
        hint.textContent = '';
        return;
      }

      emptyMsg.style.display = 'none';
      const medals = ['&#129351;','&#129352;','&#129353;'];

      entries.forEach(([id, m], i) => {
        const score = m.score || 0;
        const tr = document.createElement('tr');
        const actionsTd = isAdmin
          ? `<td class="col-actions">
               <button class="btn-score btn-minus" data-id="${id}" data-delta="-1">&minus;</button>
               <button class="btn-score btn-plus"  data-id="${id}" data-delta="1">+</button>
             </td>`
          : '';
        tr.innerHTML = `
          <td class="col-rank">${medals[i] ?? (i + 1)}</td>
          <td class="col-name">${escHtml(m.name)}</td>
          <td class="col-score ${score > 0 ? 'score-positive' : 'score-zero'}">${score}</td>${actionsTd}`;
        tableBody.appendChild(tr);
      });

      if (isAdmin) {
        tableBody.querySelectorAll('.btn-score').forEach(btn => {
          btn.addEventListener('click', () => changeScore(btn.dataset.id, parseInt(btn.dataset.delta)));
        });
      }

      hint.textContent = `${entries.length} membre${entries.length > 1 ? 's' : ''} \u2014 tri\u00E9 par score`;
    }

    membersRef.on('value', snap => {
      membersData = snap.val() || {};
      renderTable();
    });
  </script>
</body>
</html>
