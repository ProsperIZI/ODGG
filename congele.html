<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Congèle ODGG</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 32px;
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666;
    }

    /* NAV */
    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    nav a, nav button {
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
      border: 1px solid #2a2a40;
      color: #888;
      background: #1a1a2e;
      cursor: pointer;
    }
    nav a:hover, nav button:hover { opacity: 0.75; }
    nav a.active { background: #6c63ff; color: #fff; border-color: #6c63ff; }
    nav .btn-login { border-color: #ffbe76; color: #ffbe76; }
    nav .btn-logout { border-color: #6c63ff; color: #6c63ff; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 16px;
      padding: 32px;
      width: 320px;
      text-align: center;
    }
    .modal h3 {
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 20px;
    }
    .modal input {
      width: 100%;
      background: #12121f;
      border: 1px solid #2a2a40;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 12px;
      text-align: center;
    }
    .modal input:focus { border-color: #6c63ff; }
    .modal .btn-confirm {
      width: 100%;
      padding: 12px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .modal .btn-confirm:hover { opacity: 0.85; }
    .modal .modal-error {
      color: #ff6584;
      font-size: 0.8rem;
      margin-top: 10px;
      min-height: 1.2em;
    }

    /* CONTENT */
    .container {
      width: 100%;
      max-width: 500px;
    }

    .section-title {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 16px;
      text-align: center;
    }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .add-form input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-form input:focus { border-color: #6c63ff; }
    .add-form input::placeholder { color: #444; }

    .btn-add {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }

    .word-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .word-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 12px;
      padding: 12px 16px;
    }

    .word-info {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .word-text {
      font-size: 0.95rem;
      font-weight: 600;
      word-break: break-word;
    }

    .word-score {
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 30px;
      text-align: center;
    }
    .score-positive { color: #ff6584; }
    .score-zero { color: #555; }

    .word-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .btn-score {
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn-score:active { transform: scale(0.9); }

    .btn-plus {
      background: #ff6584;
      color: #fff;
    }
    .btn-plus:hover { opacity: 0.85; }

    .btn-minus {
      background: #1a1a2e;
      color: #888;
      border: 1px solid #2a2a40;
    }
    .btn-minus:hover { opacity: 0.75; }

    .btn-remove {
      background: #2a2a40;
      color: #888;
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
    }
    .btn-remove:hover { background: #ff6584; color: #fff; }

    .empty-msg {
      color: #333;
      font-size: 0.85rem;
      text-align: center;
      padding: 32px 0;
      font-style: italic;
    }

    .word-count {
      font-size: 0.75rem;
      color: #444;
      text-align: center;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <h1>Congèle ODGG</h1>

  <nav>
    <a href="empereur.html">Empereur</a>
    <a href="index.html">Comité</a>
    <a href="cruche.html">Cruche</a>
    <a href="galere.html">Galère</a>
    <a href="congele.html" class="active">Congèle</a>
    <button class="btn-login" id="btnLogin">Admin</button>
  </nav>

  <!-- MODAL LOGIN -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Connexion Admin</h3>
      <input type="password" id="passInput" placeholder="Mot de passe..." autocomplete="off"/>
      <button class="btn-confirm" id="btnPassOk">Se connecter</button>
      <div class="modal-error" id="modalError"></div>
    </div>
  </div>

  <div class="container">
    <div class="section-title" id="addTitle" style="display:none">Ajouter un aliment</div>
    <div class="add-form" id="addForm" style="display:none">
      <input id="wordInput" type="text" placeholder="Nouvel aliment..." maxlength="60"/>
      <button class="btn-add" id="btnAdd">+</button>
    </div>

    <div class="section-title">Aliments</div>
    <div class="word-list" id="wordList">
      <div class="empty-msg" id="emptyMsg">Aucun aliment pour l'instant</div>
    </div>
    <div class="word-count" id="wordCount"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyBECOMyRRCKaAOThoUAS4STiFFPNhlbpvs",
      authDomain:        "odgg-80281.firebaseapp.com",
      databaseURL:       "https://odgg-80281-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "odgg-80281",
      storageBucket:     "odgg-80281.firebasestorage.app",
      messagingSenderId: "542453001838",
      appId:             "1:542453001838:web:77ae05671f3d2a299b407f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const wordsRef = db.ref('congele/words');

    // ── ELEMENTS ──
    const btnLogin     = document.getElementById('btnLogin');
    const modalOverlay = document.getElementById('modalOverlay');
    const passInput    = document.getElementById('passInput');
    const btnPassOk    = document.getElementById('btnPassOk');
    const modalError   = document.getElementById('modalError');
    const addTitle     = document.getElementById('addTitle');
    const addForm      = document.getElementById('addForm');
    const wordInput    = document.getElementById('wordInput');
    const btnAdd       = document.getElementById('btnAdd');
    const wordList     = document.getElementById('wordList');
    const emptyMsg     = document.getElementById('emptyMsg');
    const wordCount    = document.getElementById('wordCount');

    let isAdmin = false;
    let wordsData = {};

    // ── ADMIN ──
    function setAdmin(val) {
      isAdmin = val;
      if (val) {
        document.body.classList.add('is-admin');
        btnLogin.textContent = 'Deconnexion';
        btnLogin.className = 'btn-logout';
        addTitle.style.display = 'block';
        addForm.style.display = 'flex';
        localStorage.setItem('odgg_admin', '1');
      } else {
        document.body.classList.remove('is-admin');
        btnLogin.textContent = 'Admin';
        btnLogin.className = 'btn-login';
        addTitle.style.display = 'none';
        addForm.style.display = 'none';
        localStorage.removeItem('odgg_admin');
      }
      render();
    }

    btnLogin.addEventListener('click', () => {
      if (isAdmin) { setAdmin(false); return; }
      modalOverlay.classList.add('open');
      passInput.value = '';
      modalError.textContent = '';
      passInput.focus();
    });

    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) modalOverlay.classList.remove('open');
    });

    function tryLogin() {
      const pass = passInput.value;
      db.ref('config/adminPass').once('value', snap => {
        const stored = snap.val();
        if (!stored) {
          db.ref('config/adminPass').set('odgg');
          if (pass === 'odgg') { setAdmin(true); modalOverlay.classList.remove('open'); }
          else { modalError.textContent = 'Mot de passe incorrect'; }
        } else if (pass === stored) {
          setAdmin(true); modalOverlay.classList.remove('open');
        } else {
          modalError.textContent = 'Mot de passe incorrect';
        }
      });
    }

    btnPassOk.addEventListener('click', tryLogin);
    passInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    if (localStorage.getItem('odgg_admin') === '1') {
      db.ref('config/adminPass').once('value', () => setAdmin(true));
    }

    // ── UTILS ──
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addWord() {
      const text = wordInput.value.trim();
      if (!text) return;
      wordsRef.push({ text: text, score: 0, createdAt: Date.now() });
      wordInput.value = '';
      wordInput.focus();
    }

    function changeScore(id, delta) {
      wordsRef.child(id).child('score').transaction(current => {
        const val = (current || 0) + delta;
        return val < 0 ? 0 : val;
      });
    }

    btnAdd.addEventListener('click', addWord);
    wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });

    // ── RENDER ──
    function render() {
      const entries = Object.entries(wordsData).sort(([,a],[,b]) => (b.score || 0) - (a.score || 0));
      wordList.innerHTML = '';

      if (entries.length === 0) {
        wordList.appendChild(emptyMsg);
        wordCount.textContent = '';
        return;
      }

      entries.forEach(([id, w]) => {
        const score = w.score || 0;
        const card = document.createElement('div');
        card.className = 'word-card';

        const adminBtns = isAdmin
          ? '<div class="word-actions">' +
              '<button class="btn-score btn-minus" data-id="' + id + '" data-delta="-1">&minus;</button>' +
              '<button class="btn-score btn-plus" data-id="' + id + '" data-delta="1">+</button>' +
              '<button class="btn-remove" data-id="' + id + '">&#x2715;</button>' +
            '</div>'
          : '';

        card.innerHTML =
          '<div class="word-info">' +
            '<span class="word-text">' + escHtml(w.text) + '</span>' +
          '</div>' +
          '<span class="word-score ' + (score > 0 ? 'score-positive' : 'score-zero') + '">' + score + '</span>' +
          adminBtns;

        wordList.appendChild(card);
      });

      if (isAdmin) {
        wordList.querySelectorAll('.btn-score').forEach(btn => {
          btn.addEventListener('click', () => changeScore(btn.dataset.id, parseInt(btn.dataset.delta)));
        });
        wordList.querySelectorAll('.btn-remove').forEach(btn => {
          btn.addEventListener('click', () => wordsRef.child(btn.dataset.id).remove());
        });
      }

      wordCount.textContent = entries.length + ' aliment' + (entries.length > 1 ? 's' : '') + ' \u2014 tri\u00e9 par score';
    }

    wordsRef.on('value', snap => {
      wordsData = snap.val() || {};
      render();
    });
  </script>
</body>
</html>
