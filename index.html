<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comit&eacute; ODGG</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="index-page.css">
</head>
<body>

  <h1>Comit&eacute; ODGG</h1>

  <div id="navbar"></div>
  <script src="nav.js"></script>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Connexion Admin</h3>
      <input type="password" id="passInput" placeholder="Mot de passe..." autocomplete="off"/>
      <button class="btn-confirm" id="btnPassOk" onclick="tryLogin()">Se connecter</button>
      <div class="modal-error" id="modalError"></div>
    </div>
  </div>

  <div class="container">
    <div class="section-title" id="addTitle" style="display:none">Ajouter un membre</div>
    <div class="add-form" id="addForm" style="display:none">
      <input id="nameInput" type="text" placeholder="Nom du membre..." maxlength="30"/>
      <input id="roleInput" type="text" placeholder="Poste..." maxlength="40"/>
      <button class="btn-add" id="btnAdd">+</button>
    </div>

    <div class="section-title">Membres</div>
    <div class="member-list" id="memberList">
      <div class="empty-msg" id="emptyMsg">Aucun membre pour l'instant</div>
    </div>
    <div class="member-count" id="memberCount"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyBECOMyRRCKaAOThoUAS4STiFFPNhlbpvs",
      authDomain:        "odgg-80281.firebaseapp.com",
      databaseURL:       "https://odgg-80281-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "odgg-80281",
      storageBucket:     "odgg-80281.firebasestorage.app",
      messagingSenderId: "542453001838",
      appId:             "1:542453001838:web:77ae05671f3d2a299b407f"
    };

    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();
    var membersRef = db.ref('comite/members');

    // ── ELEMENTS ──
    var btnLogin     = document.getElementById('btnLogin');
    var modalOverlay = document.getElementById('modalOverlay');
    var passInput    = document.getElementById('passInput');
    var btnPassOk    = document.getElementById('btnPassOk');
    var modalError   = document.getElementById('modalError');
    var addTitle     = document.getElementById('addTitle');
    var addForm      = document.getElementById('addForm');
    var nameInput    = document.getElementById('nameInput');
    var roleInput    = document.getElementById('roleInput');
    var btnAdd       = document.getElementById('btnAdd');
    var memberList   = document.getElementById('memberList');
    var emptyMsg     = document.getElementById('emptyMsg');
    var memberCount  = document.getElementById('memberCount');

    var isAdmin = false;
    var membersData = {};

    // ── ADMIN ──
    function setAdmin(val) {
      isAdmin = val;
      if (val) {
        document.body.classList.add('is-admin');
        btnLogin.textContent = 'Deconnexion';
        btnLogin.className = 'btn-logout';
        addTitle.style.display = 'block';
        addForm.style.display = 'flex';
        localStorage.setItem('odgg_admin', '1');
      } else {
        document.body.classList.remove('is-admin');
        btnLogin.textContent = 'Admin';
        btnLogin.className = 'btn-login';
        addTitle.style.display = 'none';
        addForm.style.display = 'none';
        localStorage.removeItem('odgg_admin');
      }
      renderMembers();
    }

    function onLoginClick() {
      if (isAdmin) { setAdmin(false); return; }
      modalOverlay.classList.add('open');
      passInput.value = '';
      modalError.textContent = '';
      setTimeout(function() { passInput.focus(); }, 100);
    }

    btnLogin.addEventListener('click', onLoginClick);

    modalOverlay.addEventListener('click', function(e) {
      if (e.target === modalOverlay) modalOverlay.classList.remove('open');
    });

    function tryLogin() {
      var pass = passInput.value;
      db.ref('config/adminPass').once('value', function(snap) {
        var stored = snap.val();
        if (!stored) {
          db.ref('config/adminPass').set('odgg');
          stored = 'odgg';
        }
        if (pass === stored) {
          setAdmin(true);
          modalOverlay.classList.remove('open');
        } else {
          modalError.textContent = 'Mot de passe incorrect';
        }
      });
    }

    passInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') tryLogin();
    });

    // Restaurer session
    if (localStorage.getItem('odgg_admin') === '1') {
      db.ref('config/adminPass').once('value', function() { setAdmin(true); });
    }

    // ─��� UTILS ─��
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addMember() {
      var name = nameInput.value.trim();
      if (!name) return;
      var role = roleInput.value.trim();
      membersRef.push({ name: name, role: role || '', score: 0, createdAt: Date.now() });
      nameInput.value = '';
      roleInput.value = '';
      nameInput.focus();
    }

    function toggleRoleEdit(id, currentRole) {
      var existing = document.getElementById('role-edit-' + id);
      if (existing) { existing.remove(); return; }
      var rows = document.querySelectorAll('.role-edit-row');
      for (var i = 0; i < rows.length; i++) rows[i].remove();

      var card = document.querySelector('[data-card="' + id + '"]');
      if (!card) return;
      var info = card.querySelector('.member-info');

      var row = document.createElement('div');
      row.className = 'role-edit-row';
      row.id = 'role-edit-' + id;
      row.innerHTML =
        '<input class="role-edit-input" type="text" value="' + escHtml(currentRole) + '" placeholder="Poste..." maxlength="40"/>' +
        '<button class="btn-save-role">OK</button>';
      info.appendChild(row);

      var inp = row.querySelector('input');
      var btn = row.querySelector('.btn-save-role');
      inp.focus();

      function save() {
        membersRef.child(id).update({ role: inp.value.trim() });
        row.remove();
      }
      btn.addEventListener('click', save);
      inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') save(); });
    }

    btnAdd.addEventListener('click', addMember);
    nameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') roleInput.focus(); });
    roleInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') addMember(); });

    // ── RENDER ──
    function renderMembers() {
      var data = membersData;
      var entries = Object.entries(data).sort(function(a, b) { return a[1].createdAt - b[1].createdAt; });
      memberList.innerHTML = '';

      if (entries.length === 0) {
        memberList.appendChild(emptyMsg);
        memberCount.textContent = '';
        return;
      }

      for (var i = 0; i < entries.length; i++) {
        var id = entries[i][0];
        var m = entries[i][1];
        var role = m.role || '';
        var card = document.createElement('div');
        card.className = 'member-card';
        card.setAttribute('data-card', id);

        var adminBtns = isAdmin
          ? '<div style="display:flex;gap:6px;align-items:center">' +
              '<button class="btn-edit-role" data-edit="' + id + '" data-role="' + escHtml(role) + '">Poste</button>' +
              '<button class="btn-remove" data-id="' + id + '">&#x2715;</button>' +
            '</div>'
          : '';

        card.innerHTML =
          '<div class="member-info">' +
            '<div class="member-name">' + escHtml(m.name) + '</div>' +
            '<div class="member-role ' + (role ? '' : 'empty') + '">' + (role ? escHtml(role) : 'Aucun poste') + '</div>' +
            '<div class="member-score">Score cruche : ' + (m.score || 0) + '</div>' +
          '</div>' + adminBtns;
        memberList.appendChild(card);
      }

      if (isAdmin) {
        var removeBtns = memberList.querySelectorAll('.btn-remove');
        for (var j = 0; j < removeBtns.length; j++) {
          (function(btn) {
            btn.addEventListener('click', function() { membersRef.child(btn.dataset.id).remove(); });
          })(removeBtns[j]);
        }
        var editBtns = memberList.querySelectorAll('.btn-edit-role');
        for (var k = 0; k < editBtns.length; k++) {
          (function(btn) {
            btn.addEventListener('click', function() { toggleRoleEdit(btn.dataset.edit, btn.dataset.role); });
          })(editBtns[k]);
        }
      }

      memberCount.textContent = entries.length + ' membre' + (entries.length > 1 ? 's' : '');
    }

    membersRef.on('value', function(snap) {
      membersData = snap.val() || {};
      renderMembers();
    });
  </script>
</body>
</html>
