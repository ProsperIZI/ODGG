<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empereur ODGG</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0f1a;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 40px;
    }

    h1 {
      font-size: 1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #666;
    }

    #fbStatus {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #444;
      margin-top: -20px;
      transition: color 0.3s;
    }

    /* NAV */
    nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    nav a, nav button {
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: opacity 0.2s;
      border: 1px solid #2a2a40;
      color: #888;
      background: #1a1a2e;
      cursor: pointer;
    }
    nav a:hover, nav button:hover { opacity: 0.75; }
    nav a.active { background: #6c63ff; color: #fff; border-color: #6c63ff; }
    nav .btn-login { border-color: #ffbe76; color: #ffbe76; }
    nav .btn-logout { border-color: #6c63ff; color: #6c63ff; }

    /* ADMIN */
    .admin-only { display: none !important; }
    body.is-admin .admin-only { display: flex !important; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 16px;
      padding: 32px;
      width: 320px;
      text-align: center;
    }
    .modal h3 {
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 20px;
    }
    .modal input {
      width: 100%;
      background: #12121f;
      border: 1px solid #2a2a40;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 12px;
      text-align: center;
    }
    .modal input:focus { border-color: #6c63ff; }
    .modal .btn-confirm {
      width: 100%;
      padding: 12px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .modal .btn-confirm:hover { opacity: 0.85; }
    .modal .modal-error {
      color: #ff6584;
      font-size: 0.8rem;
      margin-top: 10px;
      min-height: 1.2em;
    }

    /* ─── LAYOUT ─── */
    .layout {
      display: flex;
      gap: 48px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 900px;
    }

    /* ─── TIMER ─── */
    .timer-section { text-align: center; }

    .timer-wrapper {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto 28px;
    }

    svg { transform: rotate(-90deg); width: 280px; height: 280px; }

    .track { fill: none; stroke: #1a1a2e; stroke-width: 12; }
    .progress {
      fill: none; stroke: #6c63ff; stroke-width: 12; stroke-linecap: round;
      stroke-dasharray: 754;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 0.5s linear, stroke 0.5s;
    }
    .progress.warn   { stroke: #ffbe76; }
    .progress.danger { stroke: #ff6584; }

    .time-display {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); text-align: center;
    }
    .time-text { font-size: 3.5rem; font-weight: 700; letter-spacing: 0.05em; line-height: 1; }
    .round-label { font-size: 0.8rem; color: #666; margin-top: 8px; letter-spacing: 0.15em; }
    .round-badge { color: #6c63ff; font-weight: 700; }

    .controls { display: flex; gap: 12px; justify-content: center; }

    button {
      padding: 11px 28px; border: none; border-radius: 50px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      letter-spacing: 0.04em; transition: transform 0.1s, opacity 0.2s;
    }
    button:active { transform: scale(0.96); }

    #btnStart { background: #6c63ff; color: #fff; }
    #btnStart:hover { opacity: 0.85; }
    #btnReset { background: #1a1a2e; color: #888; border: 1px solid #2a2a40; }
    #btnReset:hover { opacity: 0.75; }

    /* ─── CLASSEMENT ─── */
    .ranking-section {
      flex: 1;
      min-width: 280px;
      max-width: 420px;
    }

    .ranking-section h2 {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 16px;
    }

    .add-player {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .add-player input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 10px;
      padding: 10px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-player input:focus { border-color: #6c63ff; }
    .add-player input::placeholder { color: #444; }

    .btn-add {
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.85; }

    .active-players {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }

    .player-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }

    .player-name { font-size: 0.95rem; font-weight: 600; }
    .player-status { font-size: 0.75rem; color: #555; margin-top: 2px; }

    .btn-stop {
      background: #ff6584;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .btn-stop:hover { opacity: 0.8; }
    .btn-stop:disabled {
      background: #2a2a40;
      color: #555;
      cursor: default;
    }

    .leaderboard-title {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
    }

    .leaderboard {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 10px;
      padding: 9px 14px;
    }

    .lb-rank {
      font-size: 0.8rem;
      font-weight: 700;
      color: #444;
      width: 22px;
      text-align: center;
    }
    .lb-row:nth-child(1) .lb-rank { color: #ffd700; font-size: 1rem; }
    .lb-row:nth-child(2) .lb-rank { color: #c0c0c0; font-size: 0.95rem; }
    .lb-row:nth-child(3) .lb-rank { color: #cd7f32; font-size: 0.9rem; }

    .lb-name { flex: 1; font-size: 0.9rem; font-weight: 600; }
    .lb-tour {
      font-size: 0.8rem;
      background: #6c63ff22;
      color: #9d97ff;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 700;
      white-space: nowrap;
    }
    .lb-tour.loop { background: #ff658422; color: #ff6584; }

    .empty-lb {
      color: #333;
      font-size: 0.85rem;
      text-align: center;
      padding: 20px 0;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>Empereur ODGG</h1>

  <nav>
    <a href="index.html" class="active">Empereur</a>
    <a href="comite.html">Comit&eacute;</a>
    <a href="cruche.html">Cruche</a>
    <button class="btn-login" id="btnLogin">Admin</button>
  </nav>

  <div id="fbStatus">&#9679; connexion&hellip;</div>

  <!-- MODAL LOGIN -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Connexion Admin</h3>
      <input type="password" id="passInput" placeholder="Mot de passe..." autocomplete="off"/>
      <button class="btn-confirm" id="btnPassOk">Se connecter</button>
      <div class="modal-error" id="modalError"></div>
    </div>
  </div>

  <div class="layout">

    <!-- TIMER -->
    <div class="timer-section">
      <div class="timer-wrapper">
        <svg viewBox="0 0 280 280">
          <circle class="track"    cx="140" cy="140" r="120"/>
          <circle class="progress" id="progressCircle" cx="140" cy="140" r="120"/>
        </svg>
        <div class="time-display">
          <div class="time-text" id="timeText">15:00</div>
          <div class="round-label">TOUR <span class="round-badge" id="roundBadge">1 / 15</span></div>
        </div>
      </div>
      <div class="controls admin-only">
        <button id="btnStart">D&eacute;marrer</button>
        <button id="btnReset">R&eacute;initialiser</button>
      </div>
    </div>

    <!-- CLASSEMENT -->
    <div class="ranking-section">
      <h2>Classement</h2>

      <div class="add-player admin-only">
        <input id="playerInput" type="text" placeholder="Nom du joueur&hellip;" maxlength="30"/>
        <button class="btn-add" id="btnAdd">+</button>
      </div>

      <div class="active-players" id="activePlayers"></div>

      <div class="leaderboard-title">&Eacute;limin&eacute;s</div>
      <div class="leaderboard" id="leaderboard">
        <div class="empty-lb" id="emptyLb">Aucun joueur &eacute;limin&eacute; pour l'instant</div>
      </div>
    </div>

  </div>

  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyBECOMyRRCKaAOThoUAS4STiFFPNhlbpvs",
      authDomain:        "odgg-80281.firebaseapp.com",
      databaseURL:       "https://odgg-80281-default-rtdb.europe-west1.firebasedatabase.app",
      projectId:         "odgg-80281",
      storageBucket:     "odgg-80281.firebasestorage.app",
      messagingSenderId: "542453001838",
      appId:             "1:542453001838:web:77ae05671f3d2a299b407f"
    };

    firebase.initializeApp(firebaseConfig);
    const db         = firebase.database();
    const timerRef   = db.ref('game/timer');
    const playersRef = db.ref('game/players');

    // ── ADMIN AUTH ──
    let isAdmin = false;
    const btnLogin    = document.getElementById('btnLogin');
    const modalOverlay = document.getElementById('modalOverlay');
    const passInput   = document.getElementById('passInput');
    const btnPassOk   = document.getElementById('btnPassOk');
    const modalError  = document.getElementById('modalError');

    function setAdmin(val) {
      isAdmin = val;
      if (val) {
        document.body.classList.add('is-admin');
        btnLogin.textContent = 'Deconnexion';
        btnLogin.className = 'btn-logout';
        localStorage.setItem('odgg_admin', '1');
      } else {
        document.body.classList.remove('is-admin');
        btnLogin.textContent = 'Admin';
        btnLogin.className = 'btn-login';
        localStorage.removeItem('odgg_admin');
      }
      // Re-render pour afficher/masquer les boutons dans les cards
      renderActivePlayers();
      renderLeaderboard();
    }

    btnLogin.addEventListener('click', () => {
      if (isAdmin) { setAdmin(false); return; }
      modalOverlay.classList.add('open');
      passInput.value = '';
      modalError.textContent = '';
      passInput.focus();
    });

    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) modalOverlay.classList.remove('open');
    });

    function tryLogin() {
      const pass = passInput.value;
      db.ref('config/adminPass').once('value', snap => {
        const stored = snap.val();
        if (!stored) {
          // Premier lancement : on cree le mot de passe par defaut
          db.ref('config/adminPass').set('odgg');
          if (pass === 'odgg') {
            setAdmin(true);
            modalOverlay.classList.remove('open');
          } else {
            modalError.textContent = 'Mot de passe incorrect';
          }
        } else if (pass === stored) {
          setAdmin(true);
          modalOverlay.classList.remove('open');
        } else {
          modalError.textContent = 'Mot de passe incorrect';
        }
      });
    }

    btnPassOk.addEventListener('click', tryLogin);
    passInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    // Restaurer session
    if (localStorage.getItem('odgg_admin') === '1') {
      db.ref('config/adminPass').once('value', () => setAdmin(true));
    }

    // ── CONNEXION ──
    let serverOffset = 0;
    db.ref('.info/serverTimeOffset').on('value', s => { serverOffset = s.val() || 0; });
    const serverNow = () => Date.now() + serverOffset;

    const fbStatusEl = document.getElementById('fbStatus');
    db.ref('.info/connected').on('value', snap => {
      if (snap.val()) {
        fbStatusEl.textContent = '\u25CF en ligne';
        fbStatusEl.style.color = '#6c63ff';
      } else {
        fbStatusEl.textContent = '\u25CF hors ligne';
        fbStatusEl.style.color = '#ff6584';
      }
    });

    // ── CONSTANTES ──
    const CIRCUMFERENCE = 2 * Math.PI * 120;

    // ── STATE LOCAL ──
    let timerState = {
      running: false, endTime: null, secondsLeft: 15 * 60,
      totalSeconds: 15 * 60, globalTour: 1, loopCount: 0, currentMinutes: 15
    };
    let players = {};
    let localInterval = null;
    let advancePending = false;

    // ── DOM ──
    const progressEl     = document.getElementById('progressCircle');
    const timeTextEl     = document.getElementById('timeText');
    const roundBadgeEl   = document.getElementById('roundBadge');
    const btnStart       = document.getElementById('btnStart');
    const btnReset       = document.getElementById('btnReset');
    const playerInput    = document.getElementById('playerInput');
    const btnAdd         = document.getElementById('btnAdd');
    const activePlayersEl = document.getElementById('activePlayers');
    const leaderboardEl   = document.getElementById('leaderboard');
    const emptyLbEl       = document.getElementById('emptyLb');

    progressEl.style.strokeDasharray = CIRCUMFERENCE;

    function formatTime(s) {
      const m = Math.floor(s / 60), sec = s % 60;
      return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    function updateProgress(seconds, total) {
      const fraction = total > 0 ? seconds / total : 0;
      progressEl.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
      progressEl.classList.remove('warn', 'danger');
      if (fraction <= 0.25) progressEl.classList.add('danger');
      else if (fraction <= 0.5) progressEl.classList.add('warn');
    }

    function tourLabel(tour) {
      if (tour <= 15) return `Tour ${tour} (${16 - tour} min)`;
      return `Tour ${tour} (boucle ${tour - 15})`;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function computeSeconds() {
      if (timerState.running && timerState.endTime) {
        return Math.max(0, Math.round((timerState.endTime - serverNow()) / 1000));
      }
      return timerState.secondsLeft ?? 0;
    }

    function updateDisplay() {
      const seconds = computeSeconds();
      timeTextEl.textContent = formatTime(seconds);
      updateProgress(seconds, timerState.totalSeconds);

      const isStart = !timerState.running && timerState.globalTour === 1 && seconds === timerState.totalSeconds;
      btnStart.textContent = timerState.running ? 'Pause' : (isStart ? 'D\u00e9marrer' : 'Reprendre');

      if (timerState.globalTour <= 15) {
        roundBadgeEl.textContent = `${timerState.globalTour} / 15`;
      } else {
        roundBadgeEl.textContent = `\u221E boucle ${timerState.loopCount}`;
      }

      if (timerState.running && seconds <= 0 && !advancePending) {
        advancePending = true;
        advanceRound();
      }
    }

    function startLocalInterval() { stopLocalInterval(); localInterval = setInterval(updateDisplay, 500); }
    function stopLocalInterval() { if (localInterval) { clearInterval(localInterval); localInterval = null; } }

    function fbStart() {
      const seconds = computeSeconds();
      timerRef.update({ running: true, endTime: serverNow() + seconds * 1000, secondsLeft: seconds });
    }
    function fbPause() {
      const seconds = computeSeconds();
      timerRef.update({ running: false, secondsLeft: seconds, endTime: null });
    }
    function fbReset() {
      timerRef.set({ running: false, endTime: null, secondsLeft: 15*60, totalSeconds: 15*60, globalTour: 1, loopCount: 0, currentMinutes: 15 });
      const updates = {};
      Object.keys(players).forEach(id => { updates[`${id}/eliminated`] = false; updates[`${id}/tourStopped`] = null; });
      if (Object.keys(updates).length) playersRef.update(updates);
    }

    function advanceRound() {
      timerRef.transaction(timer => {
        if (!timer || !timer.running) return;
        const now = serverNow();
        if (timer.endTime > now + 1000) return;
        let { globalTour, currentMinutes, loopCount } = timer;
        globalTour++;
        if (currentMinutes > 1) currentMinutes--; else loopCount++;
        const newSeconds = currentMinutes * 60;
        return { ...timer, globalTour, currentMinutes, loopCount, secondsLeft: newSeconds, totalSeconds: newSeconds, endTime: now + newSeconds * 1000 };
      }, () => { advancePending = false; });
    }

    timerRef.once('value', snap => {
      if (!snap.exists()) {
        timerRef.set({ running: false, endTime: null, secondsLeft: 15*60, totalSeconds: 15*60, globalTour: 1, loopCount: 0, currentMinutes: 15 });
      }
    });

    timerRef.on('value', snap => {
      const data = snap.val(); if (!data) return;
      timerState = data;
      if (timerState.running) startLocalInterval(); else stopLocalInterval();
      updateDisplay();
    });

    playersRef.on('value', snap => {
      players = snap.val() || {};
      renderActivePlayers();
      renderLeaderboard();
    });

    btnStart.addEventListener('click', () => { timerState.running ? fbPause() : fbStart(); });
    btnReset.addEventListener('click', fbReset);

    function addPlayer(name) {
      name = name.trim(); if (!name) return;
      playersRef.push({ name, eliminated: false, tourStopped: null, order: Date.now() });
    }
    function eliminatePlayer(id) { playersRef.child(id).update({ eliminated: true, tourStopped: timerState.globalTour }); }
    function removePlayer(id) { playersRef.child(id).remove(); }

    function renderActivePlayers() {
      activePlayersEl.innerHTML = '';
      const sorted = Object.entries(players).sort(([,a],[,b]) => a.order - b.order);
      const active = sorted.filter(([,p]) => !p.eliminated);
      if (sorted.length === 0) return;

      active.forEach(([id, p]) => {
        const card = document.createElement('div');
        card.className = 'player-card';
        const btns = isAdmin
          ? `<div style="display:flex;gap:8px;align-items:center">
               <button class="btn-stop" data-id="${id}">Arr\u00eat</button>
               <button class="btn-stop" style="background:#2a2a40;font-size:1rem;padding:6px 10px" data-remove="${id}" title="Supprimer">\u2715</button>
             </div>`
          : '';
        card.innerHTML = `
          <div>
            <div class="player-name">${escHtml(p.name)}</div>
            <div class="player-status">En course \u2014 ${tourLabel(timerState.globalTour)}</div>
          </div>${btns}`;
        activePlayersEl.appendChild(card);
      });

      if (isAdmin) {
        activePlayersEl.querySelectorAll('.btn-stop[data-id]').forEach(btn => {
          btn.addEventListener('click', () => eliminatePlayer(btn.dataset.id));
        });
        activePlayersEl.querySelectorAll('[data-remove]').forEach(btn => {
          btn.addEventListener('click', () => removePlayer(btn.dataset.remove));
        });
      }
    }

    function renderLeaderboard() {
      leaderboardEl.innerHTML = '';
      const elim = Object.entries(players).filter(([,p]) => p.eliminated).sort(([,a],[,b]) => b.tourStopped - a.tourStopped);

      if (elim.length === 0) { leaderboardEl.appendChild(emptyLbEl); return; }

      const medals = ['\uD83E\uDD47','\uD83E\uDD48','\uD83E\uDD49'];
      elim.forEach(([id, p], i) => {
        const isLoop = p.tourStopped > 15;
        const row = document.createElement('div');
        row.className = 'lb-row';
        const removeBtn = isAdmin
          ? `<button style="background:none;border:none;color:#333;cursor:pointer;font-size:0.9rem;padding:2px 4px" title="Retirer" data-remove-lb="${id}">\u2715</button>`
          : '';
        row.innerHTML = `
          <div class="lb-rank">${medals[i] ?? (i + 1)}</div>
          <div class="lb-name">${escHtml(p.name)}</div>
          <div class="lb-tour ${isLoop ? 'loop' : ''}">${tourLabel(p.tourStopped)}</div>${removeBtn}`;
        leaderboardEl.appendChild(row);
      });

      if (isAdmin) {
        leaderboardEl.querySelectorAll('[data-remove-lb]').forEach(btn => {
          btn.addEventListener('click', () => removePlayer(btn.dataset.removeLb));
        });
      }
    }

    btnAdd.addEventListener('click', () => { addPlayer(playerInput.value); playerInput.value = ''; playerInput.focus(); });
    playerInput.addEventListener('keydown', e => { if (e.key === 'Enter') { addPlayer(playerInput.value); playerInput.value = ''; } });
  </script>
</body>
</html>
